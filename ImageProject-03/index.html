<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="sky" src="assets/project3_sky.png">
        <a-asset-item id="bird" src="assets/Crow.glb"></a-asset-item>
        <a-asset-item id="flybird" src="assets/Bird.glb"></a-asset-item>
        <a-asset-item id="cactus" src="assets/Cactus.glb"></a-asset-item>
        <a-asset-item id="plant" src="assets/Plant.glb"></a-asset-item>
        <a-asset-item id="alien" src="assets/alien in green spaceship.glb"></a-asset-item>
        
      </a-assets>
      <a-gltf-model src="#bird" position="-1 0.5 -3" rotation="0 45 0" scale="0.01 0.01 0.01"></a-gltf-model>
      <a-gltf-model src="#flybird" position="0 1.25 -5" scale="0.01 0.01 0.01"></a-gltf-model>
      <a-gltf-model src="#cactus" position="1 0.75 -3" scale="0.01 0.01 0.01"></a-gltf-model>
      <a-gltf-model src="#plant" position="2 0.75 -3" scale="0.01 0.01 0.01"></a-gltf-model>
      <a-gltf-model src="#alien" position="3 0.75 -3" scale="0.01 0.01 0.01"></a-gltf-model>
    
      <a-sky src="#sky"></a-sky>
    </a-scene>
  </body>
</html>
