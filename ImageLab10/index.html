<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="sand"src="assets/sandtex.jpg">
        <img id="moab" src="assets/summer.jpeg">
        <img id="towel" src="assets/towel.jpg">
      </a-assets>
      <!-- <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box> -->
      <a-box src="#sand" position="0 1 -5" height="2" width="0.5" color="orange"></a-box>
      <a-box src="#sand" position="2 1 -5" height="2" width="0.5" color="orange"></a-box>
      <a-box src="#sand" position="1 0.5 -5" height="1" width="2.5" color="orange"></a-box>
      <a-cone src="#sand" position="1 1.5 -5" height="1" radius-bottom="0.5" color="orange" ></a-cone>
      <!-- <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder> -->
      <a-plane src="#towel" position="0 0 -4" rotation="-90 0 10" width="3" height="4" ></a-plane>
      <a-sky src="#moab"></a-sky>
    </a-scene>
  </body>
</html>
